# ==============================================================================
# Docker Compose - Produção (nexo-rh)
# ==============================================================================
version: '3.8'

services:
  # ==============================================================================
  # PostgreSQL Database
  # ==============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: nexo-rh-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-enviafolha_db}
      POSTGRES_USER: ${DB_USER:-enviafolha_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-enviafolha_user} -d ${DB_NAME:-enviafolha_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nexo-rh-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==============================================================================
  # Backend API (nexo-rh-backend)
  # ==============================================================================
  backend:
    image: lucasplcorrea/nexo-rh-backend:latest
    container_name: nexo-rh-backend
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8002:8002"
    environment:
      # Database (PostgreSQL no compose)
      - DATABASE_URL=postgresql://${DB_USER:-enviafolha_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-enviafolha_db}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-enviafolha_db}
      - DB_USER=${DB_USER:-enviafolha_user}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password}
      
      # Evolution API (WhatsApp)
      - EVOLUTION_SERVER_URL=${EVOLUTION_SERVER_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      
      # JWT Secret
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-please-use-strong-secret}
      
      # App Config
      - PORT=8002
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Persistir uploads e arquivos processados (mapeados para o host)
      - ./data/uploads:/app/uploads
      - ./data/enviados:/app/enviados
      - ./data/holerites:/app/holerites_formatados_final
      - ./data/processed:/app/processed
      - ./data/sent:/app/sent
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexo-rh-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/v1/database/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ==============================================================================
  # Frontend (nexo-rh-frontend)
  # ==============================================================================
  frontend:
    image: lucasplcorrea/nexo-rh-frontend:latest
    container_name: nexo-rh-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
    environment:
      - REACT_APP_API_URL=${API_URL:-http://localhost:8002/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nexo-rh-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  nexo-rh-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
